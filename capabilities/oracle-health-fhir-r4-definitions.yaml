naftiko: 1.0.0-alpha2
info:
  label: Oracle Health Millennium Platform FHIR R4 API — Definitions
  description: 'Oracle Health Millennium Platform FHIR R4 API — Definitions. 2 operations. Lead operation: Search OperationDefinition.
    Self-contained Naftiko capability covering one Cerner business surface.'
  tags:
  - Cerner
  - Definitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CERNER_API_KEY: CERNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: oracle-health-fhir-r4-definitions
    baseUri: https://fhir-ehr.cerner.com/r4
    description: Oracle Health Millennium Platform FHIR R4 API — Definitions business capability. Self-contained, no shared
      references.
    resources:
    - name: OperationDefinition
      path: /OperationDefinition
      operations:
      - name: searchoperationdefinition
        method: GET
        description: Search OperationDefinition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: StructureDefinition
      path: /StructureDefinition
      operations:
      - name: searchstructuredefinition
        method: GET
        description: Search StructureDefinition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CERNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: oracle-health-fhir-r4-definitions-rest
    port: 8080
    description: REST adapter for Oracle Health Millennium Platform FHIR R4 API — Definitions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/operationdefinition
      name: operationdefinition
      description: REST surface for OperationDefinition.
      operations:
      - method: GET
        name: searchoperationdefinition
        description: Search OperationDefinition
        call: oracle-health-fhir-r4-definitions.searchoperationdefinition
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/structuredefinition
      name: structuredefinition
      description: REST surface for StructureDefinition.
      operations:
      - method: GET
        name: searchstructuredefinition
        description: Search StructureDefinition
        call: oracle-health-fhir-r4-definitions.searchstructuredefinition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oracle-health-fhir-r4-definitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Health Millennium Platform FHIR R4 API — Definitions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: search-operationdefinition
      description: Search OperationDefinition
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oracle-health-fhir-r4-definitions.searchoperationdefinition
      outputParameters:
      - type: object
        mapping: $.
    - name: search-structuredefinition
      description: Search StructureDefinition
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oracle-health-fhir-r4-definitions.searchstructuredefinition
      outputParameters:
      - type: object
        mapping: $.
