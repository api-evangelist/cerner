naftiko: 1.0.0-alpha2
info:
  label: Oracle Health Millennium Platform FHIR R4 API — Condition
  description: 'Oracle Health Millennium Platform FHIR R4 API — Condition. 1 operations. Lead operation: Search or Read Condition.
    Self-contained Naftiko capability covering one Cerner business surface.'
  tags:
  - Cerner
  - Condition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CERNER_API_KEY: CERNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: oracle-health-fhir-r4-condition
    baseUri: https://fhir-ehr.cerner.com/r4
    description: Oracle Health Millennium Platform FHIR R4 API — Condition business capability. Self-contained, no shared
      references.
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: searchcondition
        method: GET
        description: Search or Read Condition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
          description: Patient resource reference.
    authentication:
      type: bearer
      token: '{{env.CERNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: oracle-health-fhir-r4-condition-rest
    port: 8080
    description: REST adapter for Oracle Health Millennium Platform FHIR R4 API — Condition. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/condition
      name: condition
      description: REST surface for Condition.
      operations:
      - method: GET
        name: searchcondition
        description: Search or Read Condition
        call: oracle-health-fhir-r4-condition.searchcondition
        with:
          patient: rest.patient
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oracle-health-fhir-r4-condition-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Health Millennium Platform FHIR R4 API — Condition. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: search-read-condition
      description: Search or Read Condition
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oracle-health-fhir-r4-condition.searchcondition
      with:
        patient: tools.patient
      outputParameters:
      - type: object
        mapping: $.
